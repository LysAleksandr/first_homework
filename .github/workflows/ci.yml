name: Java CI with Maven

on:
  push:
    branches: [ "hometask_2" ]
  pull_request:
    branches: [ "Feature/hw14_to_do_list_manager" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B compile

      - name: Run tests
        run: mvn test